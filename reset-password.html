<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Recovery - Finance Tracker</title>

    <link rel="icon" type="image/gif" href="assets/gif/wallet.gif">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="bg-[#0a140e] overflow-hidden">
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="flex items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl animate-fade">
            
            <header class="text-center mb-8">
                <img src="assets/gif/coin.gif" alt="System Logo" class="w-16 h-16 mx-auto mb-4 object-contain drop-shadow-lg">
                <h1 class="text-2xl font-mono font-bold text-white uppercase tracking-wider">New Password</h1>
                <p class="text-gray-400 text-sm mt-2">Please enter a new password for your account</p>
            </header>

            <section id="reset-form">
                <div class="mb-5">
                    <label class="block text-gray-500 text-[10px] font-black mb-2 uppercase tracking-widest" for="new-password">
                        New Password
                    </label>
                    <input class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-emerald-400 transition-all placeholder-gray-600" 
                           id="new-password" type="password" placeholder="Minimum 6 characters" autocomplete="new-password">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-500 text-[10px] font-black mb-2 uppercase tracking-widest" for="confirm-password">
                        Verify Password
                    </label>
                    <input class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-emerald-400 transition-all placeholder-gray-600" 
                           id="confirm-password" type="password" placeholder="Re-enter password" autocomplete="new-password">
                    
                    <p id="error-msg" class="hidden text-[#ef4444] text-[13px] font-medium mt-2 flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                        <span>Passwords do not match</span>
                    </p>
                </div>

                <button onclick="handleResetPassword()" id="reset-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xs uppercase tracking-widest py-4 rounded-xl transition-all shadow-lg shadow-emerald-500/20 active:scale-95">
                    Update Password
                </button>

                <footer class="text-center mt-8 text-xs font-bold text-gray-500 uppercase tracking-tighter">
                    Remembered your credentials? <a href="login.html" class="text-emerald-400 hover:underline">Return to Sign In</a>
                </footer>
            </section>
        </div>
    </div>

    <script src="scripts/reset-password.js"></script>
    <script src="scripts/components.js"></script>
</body>
</html>
