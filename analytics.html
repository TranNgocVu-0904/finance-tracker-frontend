<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Analytics - Finance Tracker</title>
    
    <link rel="icon" type="image/gif" href="assets/gif/wallet.gif">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="templatemo-glass-admin-style.css">
    
    <script src="scripts/auth.js"></script> 
</head>

<body>
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="app-layout" class="analytics">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header mb-8 mt-2">
                <div class="flex items-center gap-3">

                    <div class="w-11 h-11 flex-shrink-0">
                        <img src="assets/gif/coin.gif" alt="Finance Tracker Logo" class="h-full w-full object-contain">
                    </div>

                    <div class="flex flex-col justify-center">
                        <span class="text-xl font-bold text-white whitespace-nowrap leading-tight">Finance Tracker</span>
                    </div>

                </div>
            </div>

            <ul class="nav-menu">
                <li class="nav-section">
                    <span class="nav-section-title">Features</span>
                    <ul>
                        <li class="nav-item">
                            <a href="index.html" class="nav-link">
                                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7" rx="1" />
                                    <rect x="14" y="3" width="7" height="7" rx="1" />
                                    <rect x="3" y="14" width="7" height="7" rx="1" />
                                    <rect x="14" y="14" width="7" height="7" rx="1" />
                                </svg>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="analytics.html" class="nav-link active">
                                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                                    <path d="M2 17l10 5 10-5" />
                                    <path d="M2 12l10 5 10-5" />
                                </svg>
                                Analytics
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="settings.html" class="nav-link">
                                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="3" />
                                    <path
                                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                                </svg>
                                Settings
                            </a>
                        </li>
                    </ul>
                </li>
                <li class="nav-section">
                    <span class="nav-section-title">Account</span>
                    <ul>
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="logout()">
                                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                    <polyline points="16 17 21 12 16 7" />
                                    <line x1="21" y1="12" x2="9" y2="12" />
                                </svg>
                                Sign out
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
            <div class="mt-auto pt-6 pb-4 w-full text-center border-t border-white/10">
                <button onclick="openCreditsModal()"
                    class="text-[12px] text-white/40 hover:text-white transition-colors underline decoration-white/20 underline-offset-4">
                    Resources & Copyright
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="navbar glass-card mb-8 bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20 shadow-xl">
                <div class="page-header">
                    <h1 class="font-mono text-2xl font-bold uppercase text-white mb-2 flex items-center">Analytics</h1>
                    <nav class="page-breadcrumb text-gray-400 font-bold text-xs uppercase tracking-widest">
                        <a href="index.html" class="hover:text-emerald-400 transition">Dashboard</a> / <span class="text-white">Analytics</span>
                    </nav>
                </div>
            </header>

            <section class="stats-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="glass-card glass-card-3d stat-card p-6 rounded-3xl">
                    <div class="stat-card-inner flex justify-between items-center">
                        <div class="stat-info">
                            <h3 class="text-gray-400 uppercase text-[10px] font-black tracking-widest mb-1">Total Expenses</h3>
                            <div class="stat-value text-2xl font-bold text-white font-mono" id="stat-total">0</div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase">Million VNĐ</span>
                        </div>
                        <div class="stat-icon purple p-3 rounded-2xl bg-purple-500/10 text-purple-400">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                        </div>
                    </div>
                </div>

                <div class="glass-card glass-card-3d stat-card p-6 rounded-3xl">
                    <div class="stat-card-inner flex justify-between items-center">
                        <div class="stat-info">
                            <h3 class="text-gray-400 uppercase text-[10px] font-black tracking-widest mb-1">Daily Average</h3>
                            <div class="stat-value text-2xl font-bold text-amber-400 font-mono" id="stat-daily">0</div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase">Million VNĐ</span>
                        </div>
                        <div class="stat-icon magenta p-3 rounded-2xl bg-rose-500/10 text-rose-400">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                    </div>
                </div>

                <div class="glass-card glass-card-3d stat-card p-6 rounded-3xl">
                    <div class="stat-card-inner flex justify-between items-center">
                        <div class="stat-info">
                            <h3 class="text-gray-400 uppercase text-[10px] font-black tracking-widest mb-1">Count</h3>
                            <div class="stat-value text-2xl font-bold text-cyan-400 font-mono" id="stat-count">0</div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase">Transactions</span>
                        </div>
                        <div class="stat-icon cyan p-3 rounded-2xl bg-cyan-500/10 text-cyan-400">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        </div>
                    </div>
                </div>

                <div class="glass-card glass-card-3d stat-card p-6 rounded-3xl">
                    <div class="stat-card-inner flex justify-between items-center">
                        <div class="stat-info">
                            <h3 class="text-gray-400 uppercase text-[10px] font-black tracking-widest mb-1">Most spent</h3>
                            <div class="stat-value text-2xl font-bold text-rose-400 font-mono" id="stat-max">0</div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase">Million VNĐ</span>
                        </div>
                        <div class="stat-icon success p-3 rounded-2xl bg-emerald-500/10 text-emerald-400">
                            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                    </div>
                </div>
            </section>
            
            <section class="glass-card chart-card p-8 rounded-3xl border border-white/20 bg-white/5 backdrop-blur-md mb-10 shadow-2xl">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
                    <div>
                        <h2 class="text-xs font-mono font-bold uppercase text-[#C4B5FD] tracking-[0.3em] mb-4 flex items-center gap-2" id="analytics-title">
                             Category Analysis Engine
                        </h2>
                        <div class="flex items-center gap-3">
                             <select id="analytics-category" class="bg-[#0f172a] border border-white/10 rounded-xl px-4 py-2 text-xs text-gray-400 focus:outline-none focus:border-emerald-500 cursor-pointer hover:bg-white/5 transition">
                                <option value="Overview">Global Overview</option>
                                <option value="Housing">Housing</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Food and Drink">Food and Drink</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Salary">Salary Revenue</option>
                                <option value="Bonus">Bonus Rewards</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-actions flex bg-white/5 p-1 rounded-xl border border-white/10">
                        <button class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all" id="btn-7d">7D</button>
                        <button class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all active bg-emerald-600 text-white shadow-lg" id="btn-30d">30D</button>
                        <button class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all" id="btn-90d">90D</button>
                    </div>
                </div>
                
                <div class="w-full relative" style="height: 400px;">
                    <canvas id="categoryBarChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="scripts/templatemo-glass-admin-script.js"></script>
    <script src="scripts/components.js"></script>
    <script src="scripts/analytics.js"></script>
</body>
</html>
